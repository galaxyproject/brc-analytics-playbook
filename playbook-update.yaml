# Update Playbook - Update existing deployment
# Pulls latest changes, rebuilds if needed, restarts services
#
# Usage: make update-dev  (or update-prod)
---
- name: Update BRC Analytics deployment
  hosts: all

  tasks:
    # ============================================================
    # SINGLE-ENVIRONMENT HOSTS (TACC)
    # ============================================================

    # Pull latest changes
    - name: Pull latest changes from repository
      ansible.builtin.git:
        repo: "{{ brc_repo_url }}"
        dest: "{{ brc_deploy_dir }}"
        version: "{{ brc_repo_branch }}"
        force: false
      register: git_pull
      when: brc_environments is not defined

    # Read the marker from the last successful update to know what to diff against.
    # If missing (first deploy, or marker cleared), default to the git empty tree hash
    # so all paths show as changed and everything rebuilds.
    - name: Check for last update commit marker
      ansible.builtin.stat:
        path: "{{ brc_deploy_dir }}/.last-update-commit"
      register: last_update_marker
      when: brc_environments is not defined

    - name: Read last update commit marker
      ansible.builtin.command:
        cmd: cat .last-update-commit
        chdir: "{{ brc_deploy_dir }}"
      register: last_update_raw
      changed_when: false
      when: brc_environments is not defined and last_update_marker.stat.exists

    - name: Set last update commit
      ansible.builtin.set_fact:
        last_update_commit: "{{ last_update_raw.stdout | trim if last_update_marker.stat.exists else '4b825dc642cb6eb9a060e54bf899d15363da7b23' }}"
      when: brc_environments is not defined

    # Fail loudly if the marker resolution produced something unusable --
    # an empty value here silently collapses downstream git diff commands
    # and skips rebuilds without any error
    - name: Validate last update commit is set
      ansible.builtin.assert:
        that:
          - last_update_commit is defined
          - last_update_commit | length >= 7
        fail_msg: "last_update_commit is empty or too short; change detection would silently skip rebuilds"
      when: brc_environments is not defined

    # Check if catalog source changed
    - name: Check for catalog source changes
      ansible.builtin.command:
        cmd: git diff --name-only {{ last_update_commit }} HEAD -- catalog/source/
        chdir: "{{ brc_deploy_dir }}"
      register: catalog_changes
      changed_when: false
      failed_when: false
      when: brc_environments is not defined

    # Rebuild catalog if source changed
    - name: Rebuild catalog data (if source changed)
      ansible.builtin.command:
        cmd: npm run build-brc-db
        chdir: "{{ brc_deploy_dir }}"
      when: brc_environments is not defined and (catalog_changes.stdout | default('') | length > 0 or force_rebuild | default(false))
      register: catalog_rebuild

    # Update npm dependencies if package-lock changed
    - name: Check for package-lock changes
      ansible.builtin.command:
        cmd: git diff --name-only {{ last_update_commit }} HEAD -- package-lock.json
        chdir: "{{ brc_deploy_dir }}"
      register: npm_changes
      changed_when: false
      failed_when: false
      when: brc_environments is not defined

    - name: Update npm dependencies (if package-lock changed)
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ brc_deploy_dir }}"
      when: brc_environments is not defined and (npm_changes.stdout | default('') | length > 0 or force_rebuild | default(false))

    # Check for frontend source changes
    - name: Check for frontend source changes
      ansible.builtin.command:
        cmd: git diff --name-only {{ last_update_commit }} HEAD -- app/ pages/ site-config/ public/ next.config.mjs catalog/
        chdir: "{{ brc_deploy_dir }}"
      register: frontend_changes
      changed_when: false
      failed_when: false
      when: brc_environments is not defined

    # Rebuild Next.js static export if frontend or catalog changed
    - block:
        - name: Rebuild Next.js static export
          ansible.builtin.command:
            cmd: npm run {{ brc_build_script }} -- --no-lint
            chdir: "{{ brc_deploy_dir }}"
          register: frontend_rebuild
      when: >
        brc_environments is not defined
        and (frontend_changes.stdout | default('') | length > 0
             or catalog_rebuild.changed | default(false)
             or force_rebuild | default(false))

    # Re-template configuration files
    - name: Template backend environment file
      ansible.builtin.template:
        src: templates/api.env.j2
        dest: "{{ brc_backend_dir }}/api/.env"
        mode: "0600"
      register: env_template
      when: brc_environments is not defined

    - name: Template docker-compose override
      ansible.builtin.template:
        src: templates/docker-compose.override.yml.j2
        dest: "{{ brc_backend_dir }}/docker-compose.override.yml"
        mode: "0644"
      register: compose_template
      when: brc_environments is not defined

    - name: Template nginx SSL configuration
      ansible.builtin.template:
        src: templates/nginx-ssl.conf.j2
        dest: "{{ brc_backend_dir }}/nginx-ssl/default.conf"
        mode: "0644"
      register: nginx_template
      when: brc_environments is not defined

    # Ensure out/ exists so the nginx volume mount doesn't fail
    - name: Ensure frontend output directory exists
      ansible.builtin.file:
        path: "{{ brc_deploy_dir }}/out"
        state: directory
        mode: "0755"
      when: brc_environments is not defined

    # Check for backend changes that require a Docker image rebuild
    - name: Check for backend source changes
      ansible.builtin.command:
        cmd: git diff --name-only {{ last_update_commit }} HEAD -- backend/
        chdir: "{{ brc_deploy_dir }}"
      register: backend_changes
      changed_when: false
      failed_when: false
      when: brc_environments is not defined

    - name: Rebuild Docker images (if backend changed)
      ansible.builtin.command:
        cmd: docker compose build backend
        chdir: "{{ brc_backend_dir }}"
      environment:
        APP_VERSION: "{{ lookup('file', brc_deploy_dir + '/package.json') | from_json | json_query('version') }}"
      when: brc_environments is not defined and (backend_changes.stdout | default('') | length > 0 or force_rebuild | default(false))
      register: docker_build

    # Restart services
    # Use --force-recreate when frontend was rebuilt, because the Next.js build
    # replaces the out/ directory (new inode) and Docker's bind mount goes stale
    - name: Restart services
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans {{ '--force-recreate' if frontend_rebuild.changed | default(false) else '' }}
        chdir: "{{ brc_backend_dir }}"
      when: >
        brc_environments is not defined
        and (frontend_rebuild.changed | default(false)
             or docker_build.changed | default(false)
             or env_template.changed
             or compose_template.changed
             or nginx_template.changed
             or force_rebuild | default(false))
      register: docker_restart

    # Wait for health check
    - name: Wait for services to be healthy
      ansible.builtin.uri:
        url: "{{ health_check_url }}"
        validate_certs: false
        status_code: 200
      register: health_result
      until: health_result.status == 200
      retries: "{{ health_check_retries }}"
      delay: "{{ health_check_delay }}"
      when: brc_environments is not defined and docker_restart.changed | default(false)

    # Record the current commit so the next update diffs from here
    - name: Record successful update commit
      ansible.builtin.copy:
        content: "{{ git_pull.after }}\n"
        dest: "{{ brc_deploy_dir }}/.last-update-commit"
        mode: "0644"
      when: brc_environments is not defined

    # Report status (single-env)
    - name: Report update status
      ansible.builtin.debug:
        msg: |
          Update complete!

          Changes:
          - Repository updated: {{ git_pull.changed }}
          - Catalog rebuilt: {{ catalog_rebuild.changed | default(false) }}
          - Frontend rebuilt: {{ frontend_rebuild.changed | default(false) }}
          - Services restarted: {{ docker_restart.changed | default(false) }}

          Service URL: https://{{ brc_domain }}
      when: brc_environments is not defined

    # ============================================================
    # MULTI-ENVIRONMENT HOSTS (Jetstream)
    # ============================================================

    - name: Update each environment
      ansible.builtin.include_tasks: tasks/update-environment.yaml
      loop: "{{ brc_environments }}"
      loop_control:
        loop_var: env
      when: brc_environments is defined and (env_filter is not defined or env.name == env_filter)

    - name: Template multi-environment nginx configuration
      ansible.builtin.template:
        src: templates/nginx-multi-env.conf.j2
        dest: /etc/nginx/conf.d/brc-analytics.conf
        mode: "0644"
      become: true
      when: brc_environments is defined
      notify: Reload nginx

    - name: Report update status (multi-env)
      ansible.builtin.debug:
        msg: |
          Multi-environment update complete!

          Environments updated:
          {% for env in brc_environments %}
          - {{ env.name }}: https://{{ env.domain }}
          {% endfor %}
      when: brc_environments is defined

    # ============================================================
    # CLEANUP (all hosts)
    # ============================================================

    - name: Clean up unused Docker images and build cache
      ansible.builtin.command:
        cmd: docker system prune -af
      register: docker_prune
      changed_when: "'Total reclaimed space: 0B' not in docker_prune.stdout"

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      become: true
