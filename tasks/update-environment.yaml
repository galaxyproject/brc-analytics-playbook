# Update a single environment
# Called with 'env' variable containing environment config
---
- name: "Set environment-specific variables for {{ env.name }}"
  ansible.builtin.set_fact:
    env_deploy_dir: "/opt/brc-analytics-{{ env.name }}"
    env_backend_dir: "/opt/brc-analytics-{{ env.name }}/backend"
    brc_domain: "{{ env.domain }}"
    brc_environment: "{{ env.name }}"
    brc_repo_branch: "{{ env.branch }}"

- name: "Pull latest changes ({{ env.name }})"
  ansible.builtin.git:
    repo: "{{ brc_repo_url }}"
    dest: "{{ env_deploy_dir }}"
    version: "{{ env.branch }}"
    force: true
  register: git_pull

- name: "Read last update commit marker ({{ env.name }})"
  ansible.builtin.slurp:
    src: "{{ env_deploy_dir }}/.last-update-commit"
  register: last_update_raw
  failed_when: false

- name: "Set last update commit ({{ env.name }})"
  ansible.builtin.set_fact:
    last_update_commit: "{{ (last_update_raw.content | default('') | b64decode | trim) or '4b825dc642cb6eb9a060e54bf899d15363da7b23' }}"

# npm/catalog steps can be skipped for backend_only deployments because
# the catalog output files are committed to the repo and pulled with git
- name: "Check for catalog source changes ({{ env.name }})"
  ansible.builtin.command:
    cmd: git diff --name-only {{ last_update_commit }} HEAD -- catalog/source/
    chdir: "{{ env_deploy_dir }}"
  register: catalog_changes
  changed_when: false
  failed_when: false
  when: not (backend_only | default(false))

- name: "Rebuild catalog data ({{ env.name }})"
  ansible.builtin.command:
    cmd: npm run build-brc-db
    chdir: "{{ env_deploy_dir }}"
  when: not (backend_only | default(false)) and (catalog_changes.stdout | default('') | length > 0 or force_rebuild | default(false))

- name: "Check for package-lock changes ({{ env.name }})"
  ansible.builtin.command:
    cmd: git diff --name-only {{ last_update_commit }} HEAD -- package-lock.json
    chdir: "{{ env_deploy_dir }}"
  register: npm_changes
  changed_when: false
  failed_when: false
  when: not (backend_only | default(false))

- name: "Update npm dependencies ({{ env.name }})"
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ env_deploy_dir }}"
  when: not (backend_only | default(false)) and (npm_changes.stdout | default('') | length > 0 or force_rebuild | default(false))

- name: "Template backend environment file ({{ env.name }})"
  ansible.builtin.template:
    src: templates/api.env.j2
    dest: "{{ env_backend_dir }}/api/.env"
    mode: "0600"
  register: env_template

- name: "Template docker-compose override ({{ env.name }})"
  ansible.builtin.template:
    src: templates/docker-compose.backend-only.yml.j2
    dest: "{{ env_backend_dir }}/docker-compose.override.yml"
    mode: "0644"
  register: compose_template

- name: "Build backend image ({{ env.name }})"
  ansible.builtin.command:
    cmd: docker compose -p brc-analytics-{{ env.name }} build backend
    chdir: "{{ env_backend_dir }}"
  environment:
    APP_VERSION: "{{ lookup('file', env_deploy_dir + '/package.json') | from_json | json_query('version') }}"
  when: git_pull.changed or env_template.changed or compose_template.changed or (force_rebuild | default(false))

- name: "Restart services ({{ env.name }})"
  ansible.builtin.command:
    cmd: docker compose -p brc-analytics-{{ env.name }} up -d --force-recreate
    chdir: "{{ env_backend_dir }}"
  when: git_pull.changed or env_template.changed or compose_template.changed or (force_rebuild | default(false))
  register: docker_restart

- name: "Wait for backend to be healthy ({{ env.name }})"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ env.backend_port }}/api/v1/health"
    status_code: 200
  register: health_result
  until: health_result.status == 200
  retries: 30
  delay: 5
  when: docker_restart.changed | default(false)

- name: "Record successful update commit ({{ env.name }})"
  ansible.builtin.copy:
    content: "{{ git_pull.after }}\n"
    dest: "{{ env_deploy_dir }}/.last-update-commit"
    mode: "0644"
