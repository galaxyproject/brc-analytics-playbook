# Auto-update: systemd timer that runs brc-auto-update.sh on a schedule.
# The script checks each env's app repo (/opt/brc-analytics-<env>) for new
# commits on its tracked branch and runs the update playbook only when the
# app code has changed. The playbook repo itself is never auto-pulled --
# playbook changes are applied manually. Gated by brc_auto_update (per-env).
# Service runs as {{ brc_user }} -- the playbook update path no longer
# needs sudo, so this works on both single-env and multi-env hosts.
---
- name: Create auto-update log directory
  ansible.builtin.file:
    path: /var/log/brc-analytics
    state: directory
    owner: "{{ brc_user }}"
    group: "{{ brc_group }}"
    mode: "0755"
  become: true
  when: brc_auto_update | default(false)
- name: Create auto-update script
  ansible.builtin.template:
    src: brc-auto-update.sh.j2
    dest: /usr/local/bin/brc-auto-update.sh
    mode: "0755"
  become: true
  when: brc_auto_update | default(false)
- name: Create auto-update systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/brc-auto-update.service
    content: |
      [Unit]
      Description=BRC Analytics auto-update

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/brc-auto-update.sh
      User={{ brc_user }}
      WorkingDirectory={{ brc_playbook_dir }}
    mode: "0644"
  become: true
  when: brc_auto_update | default(false)
- name: Create auto-update systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/brc-auto-update.timer
    content: |
      [Unit]
      Description=Run BRC Analytics auto-update ({{ brc_auto_update_schedule }})

      [Timer]
      OnCalendar={{ brc_auto_update_schedule }}
      Persistent=true

      [Install]
      WantedBy=timers.target
    mode: "0644"
  become: true
  when: brc_auto_update | default(false)
- name: Enable auto-update timer
  ansible.builtin.systemd:
    name: brc-auto-update.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: brc_auto_update | default(false)
- name: Disable auto-update timer
  ansible.builtin.systemd:
    name: brc-auto-update.timer
    enabled: false
    state: stopped
    daemon_reload: true
  become: true
  failed_when: false
  when: not (brc_auto_update | default(false))