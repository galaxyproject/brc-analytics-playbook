# Bootstrap Playbook - Initial system setup
# Run once on a fresh VM to prepare for deployment
#
# Usage: make bootstrap-dev  (or bootstrap-prod)
---
- name: Bootstrap BRC Analytics server
  hosts: all
  become: true

  tasks:
    # System packages
    - name: Install required system packages
      ansible.builtin.package:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - openssl
        state: present

    # Docker installation (RHEL/CentOS/Rocky)
    - name: Add Docker repository (RHEL-based)
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Stable
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        gpgcheck: true
        gpgkey: https://download.docker.com/linux/centos/gpg
        enabled: true
      when: ansible_os_family == "RedHat"

    - name: Install Docker packages (RHEL-based)
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"

    - name: Add Docker GPG key (Debian-based)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository (Debian-based)
      ansible.builtin.apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker packages (Debian-based)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # Ensure brc-admin can run Docker
    - name: Add brc-admin to docker group
      ansible.builtin.user:
        name: "{{ brc_user }}"
        groups: docker
        append: true

    # Deployment directory (single-environment hosts)
    - name: Create deployment directory
      ansible.builtin.file:
        path: "{{ brc_deploy_dir }}"
        state: directory
        owner: "{{ brc_user }}"
        group: "{{ brc_group }}"
        mode: "0755"
      when: brc_environments is not defined

    # Deployment directories (multi-environment hosts)
    - name: Create deployment directories for each environment
      ansible.builtin.file:
        path: "/opt/brc-analytics-{{ item.name }}"
        state: directory
        owner: "{{ brc_user }}"
        group: "{{ brc_group }}"
        mode: "0755"
      loop: "{{ brc_environments }}"
      when: brc_environments is defined

    # Node.js installation (for catalog builds)
    - name: Install NodeSource repository (RHEL-based)
      ansible.builtin.shell: |
        curl -fsSL https://rpm.nodesource.com/setup_{{ nodejs_version }}.x | bash -
      args:
        creates: /etc/yum.repos.d/nodesource-el9.repo
      when: ansible_os_family == "RedHat"

    - name: Install Node.js (RHEL-based)
      ansible.builtin.dnf:
        name: nodejs
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install NodeSource repository (Debian-based)
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }}.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
      when: ansible_os_family == "Debian"

    - name: Install Node.js (Debian-based)
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    # Certbot for Let's Encrypt
    - name: Install certbot
      ansible.builtin.package:
        name: certbot
        state: present

    # Create certbot webroot directory
    - name: Create certbot webroot directory
      ansible.builtin.file:
        path: /var/www/certbot
        state: directory
        mode: "0755"

    # Host-level nginx for multi-environment setups
    - name: Install nginx (multi-environment hosts)
      ansible.builtin.package:
        name: nginx
        state: present
      when: brc_environments is defined

    - name: Allow nginx to connect to network (SELinux)
      ansible.builtin.command:
        cmd: setsebool -P httpd_can_network_connect 1
      when: brc_environments is defined and ansible_selinux.status == "enabled"
      changed_when: false

    - name: Label per-env out/ dirs as nginx content (SELinux)
      ansible.builtin.command:
        cmd: chcon -R -t httpd_sys_content_t /opt/brc-analytics-{{ item.name }}
      loop: "{{ brc_environments }}"
      when: brc_environments is defined and ansible_selinux.status == "enabled"
      changed_when: false
      failed_when: false

    # Per-env SSL cert acquisition (skipped if cert exists or ssl_skip is set).
    # Done before brc-analytics nginx config is rendered so the rendered HTTPS
    # vhosts have valid cert paths.
    - name: Check if SSL certificate exists per env
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ item.cert_domain | default(item.domain) }}/fullchain.pem"
      register: per_env_ssl_stat
      loop: "{{ brc_environments }}"
      when: brc_environments is defined and not (item.ssl_skip | default(false))

    - name: Stop nginx briefly for standalone certbot
      ansible.builtin.systemd:
        name: nginx
        state: stopped
      when:
        - brc_environments is defined
        - per_env_ssl_stat.results | default([]) | selectattr('stat', 'defined') | rejectattr('stat.exists') | list | length > 0

    - name: Obtain SSL certificate via certbot (per env)
      ansible.builtin.command:
        cmd: >
          certbot certonly --standalone
          --non-interactive
          --agree-tos
          --email {{ ssl_cert_email }}
          --domain {{ item.item.cert_domain | default(item.item.domain) }}
      loop: "{{ per_env_ssl_stat.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name | default('?') }}"
      when:
        - brc_environments is defined
        - not (item.item.ssl_skip | default(false))
        - not (item.stat.exists | default(false))

    - name: Render multi-env nginx configuration
      ansible.builtin.template:
        src: templates/nginx-multi-env.conf.j2
        dest: /etc/nginx/conf.d/brc-analytics.conf
        mode: "0644"
      when: brc_environments is defined

    - name: Create certbot renewal service for multi-env
      ansible.builtin.copy:
        dest: /etc/systemd/system/certbot-renew.service
        content: |
          [Unit]
          Description=Certbot renewal

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/certbot renew --quiet --deploy-hook "systemctl reload nginx"
        mode: "0644"
      when: brc_environments is defined

    - name: Create certbot renewal timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/certbot-renew.timer
        content: |
          [Unit]
          Description=Run certbot twice daily

          [Timer]
          OnCalendar=*-*-* 00,12:00:00
          RandomizedDelaySec=43200
          Persistent=true

          [Install]
          WantedBy=timers.target
        mode: "0644"
      when: brc_environments is defined

    - name: Enable certbot renewal timer
      ansible.builtin.systemd:
        name: certbot-renew.timer
        enabled: true
        state: started
        daemon_reload: true
      when: brc_environments is defined

    - name: Enable and start nginx (multi-environment hosts)
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted
      when: brc_environments is defined

    # Firewall configuration (if firewalld is active)
    - name: Check if firewalld is active
      ansible.builtin.command: systemctl is-active firewalld
      register: firewalld_status
      changed_when: false
      failed_when: false

    - name: Open HTTP/HTTPS ports in firewall
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - "80/tcp"
        - "443/tcp"
      when: firewalld_status.rc == 0

    - name: Display bootstrap completion message
      ansible.builtin.debug:
        msg: |
          Bootstrap complete!

          Next steps:
          1. Run 'make deploy-dev' or 'make deploy-prod' to deploy the application

          Installed:
          - Docker and docker-compose plugin
          - Node.js {{ nodejs_version }}
          - Certbot for SSL certificates
          - Deploy directory: {{ brc_deploy_dir }}
