# Shared variables for all hosts
---

# Application
brc_app_name: brc-analytics
brc_repo_url: https://github.com/galaxyproject/brc-analytics.git
brc_repo_branch: main

# npm build script (build:prod or build:dev)
brc_build_script: "build:prod"

# Paths
brc_deploy_dir: /opt/brc-analytics
brc_backend_dir: "{{ brc_deploy_dir }}/backend"
brc_catalog_dir: "{{ brc_deploy_dir }}/catalog"

# Service user (same as ansible_user -- no become_user needed for app tasks)
brc_user: brc-admin
brc_group: brc-admin

# Docker
docker_compose_project: brc-analytics

# Node.js version for catalog builds
nodejs_version: "22"

# Node heap (MB) for the Next.js static export. The catalog is ~120k+ static
# pages, and the export worker OOMs at the default heap on a build this large.
# Bump per-host in inventory if a VM has more/less RAM (keep it under physical
# RAM with headroom -- setting it above RAM makes OOM worse, not better).
nextjs_build_max_old_space_mb: 8192

# SSL/TLS
# ssl_mode options: system (use existing certs), vault (from ansible vault), self_signed, letsencrypt
ssl_mode: system
ssl_cert_dir: /etc/letsencrypt/live
ssl_cert_email: admin@example.com  # Override in environment-specific vars

# Ports (nginx listens on these)
http_port: 80
https_port: 443

# Health check
health_check_url: "https://localhost/api/v1/health"
health_check_retries: 30
health_check_delay: 10

# Redis
redis_maxmemory: 256mb
redis_maxmemory_policy: allkeys-lru

# Auto-update (disabled by default, enabled for dev)
brc_auto_update: false
brc_auto_update_schedule: hourly
brc_playbook_dir: /home/brc-admin/brc-analytics-playbook

# Backend API settings (non-sensitive)
api_log_level: INFO
api_rate_limit_requests: 100
api_rate_limit_window: 60

# Sentry error tracking (DSN set per-environment)
sentry_dsn: ""

# Assistant session-cookie signing secret. Real value lives in vault
# (vault_session_cookie_secret); the empty default keeps local/dev working.
# The backend refuses to boot when this is empty and ENVIRONMENT is not
# local/dev/development, so it must be set for prod (and any non-dev env).
session_cookie_secret: "{{ vault_session_cookie_secret | default('') }}"

# Keycloak / OIDC SSO (Galaxy auth via auth.usegalaxy.org).
# The issuer host is shared; realm, client id, and client secret differ per
# environment and are set on each entry in `brc_environments` (inventory).
# Auth is only configured for environments that set keycloak_client_id -- these
# empty defaults keep the env template inert everywhere else.
keycloak_auth_base_url: https://auth.usegalaxy.org
brc_keycloak_realm: ""
brc_keycloak_client_id: ""
brc_keycloak_client_secret: ""
