# Development-specific variables
---

brc_environment: development

# Track main branch in development
brc_repo_branch: main

# Use dev build script for frontend builds
brc_build_script: "build:dev"

# Nightly auto-update from main
brc_auto_update: true

# API settings - more verbose logging in dev
api_log_level: DEBUG

# SSL certificates are managed by TACC NSO (ssl_mode: system)
# Cert paths are defined in inventory/hosts.yaml per host
