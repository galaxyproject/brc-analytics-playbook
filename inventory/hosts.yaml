# BRC Analytics Inventory
#
# Run playbooks locally on the target VM after SSH login.

all:
  vars:
    ansible_user: brc-admin

  children:
    production:
      hosts:
        brc-analytics-prod.tacc.utexas.edu:
          ssl_cert_email: dannon.baker@gmail.com
          brc_environments:
            - name: brc-prod
              domain: brc-analytics.org
              # Existing letsencrypt cert is filed under prod.brc-analytics.org
              cert_domain: prod.brc-analytics.org
              domain_aliases:
                - prod.brc-analytics.org
                - www.brc-analytics.org
              branch: production
              backend_port: 8000
              context: brc
            - name: ga2-prod
              domain: ga2.brc-analytics.org   # confirm before deploy
              branch: production
              backend_port: 8001
              context: ga2
              # Skip cert acquisition; install cert manually then flip off
              ssl_skip: true

    development:
      hosts:
        brc-analytics-dev.tacc.utexas.edu:
          ssl_cert_email: dannon.baker@gmail.com
          brc_environments:
            - name: brc-dev
              domain: dev.brc-analytics.org
              branch: main
              backend_port: 8000
              context: brc
            - name: ga2-dev
              domain: ga2-dev.brc-analytics.org   # confirm before deploy
              branch: main
              backend_port: 8001
              context: ga2
              ssl_skip: true

    # Jetstream hosts run multiple environments on a single VM
    # using host-level nginx for SSL/routing
    jetstream:
      hosts:
        brc-backend.novalocal:
          ansible_host: 149.165.172.128
          ssl_cert_email: dannon.baker@gmail.com
          # Skip npm/catalog builds - only running backend containers
          backend_only: true
          # Multiple environments on this host
          brc_environments:
            - name: staging
              domain: platform-staging.brc-analytics.org
              branch: main
              backend_port: 8000
            - name: beta
              domain: platform-beta.brc-analytics.org
              branch: production
              backend_port: 8001
