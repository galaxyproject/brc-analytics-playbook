# BRC Analytics Inventory
#
# Default: remote execution over SSH from a workstation (on VPN).
# For local execution on the VM itself, pass LOCAL=1 to make targets.

all:
  vars:
    ansible_user: brc-admin

  children:
    production:
      hosts:
        brc-analytics-prod.tacc.utexas.edu:
          brc_environment: production
          brc_domain: brc-analytics.org
          brc_domain_aliases:
            - prod.brc-analytics.org
            - www.brc-analytics.org
          ssl_mode: letsencrypt
          ssl_cert_email: dannon.baker@gmail.com
          ssl_cert_path: /etc/letsencrypt/live/prod.brc-analytics.org/fullchain.pem
          ssl_key_path: /etc/letsencrypt/live/prod.brc-analytics.org/privkey.pem

    development:
      hosts:
        brc-analytics-dev.tacc.utexas.edu:
          brc_environment: development
          brc_domain: dev.brc-analytics.org
          ssl_mode: letsencrypt
          ssl_cert_email: dannon.baker@gmail.com
          ssl_cert_path: /etc/letsencrypt/live/dev.brc-analytics.org/fullchain.pem
          ssl_key_path: /etc/letsencrypt/live/dev.brc-analytics.org/privkey.pem

    # Jetstream hosts run multiple environments on a single VM
    # using host-level nginx for SSL/routing
    jetstream:
      hosts:
        brc-backend.novalocal:
          ansible_host: 149.165.172.128
          ssl_cert_email: dannon.baker@gmail.com
          # Skip npm/catalog builds - only running backend containers
          backend_only: true
          # Multiple environments on this host
          brc_environments:
            - name: staging
              domain: platform-staging.brc-analytics.org
              branch: main
              backend_port: 8000
            - name: beta
              domain: platform-beta.brc-analytics.org
              branch: production
              backend_port: 8001
