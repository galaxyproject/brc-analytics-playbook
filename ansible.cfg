[defaults]
# Use the built-in default callback with YAML-formatted task results.
# The old community.general.yaml callback was removed in newer Ansible releases.
stdout_callback = default
callback_result_format = yaml
# Reduce output noise
deprecation_warnings = False
# Vault password file (gitignored)
vault_password_file = .vault-password.txt
# Roles and collections paths
roles_path = roles
collections_path = collections
# Retry files location
retry_files_save_path = .retry

[privilege_escalation]
# Only tasks that explicitly set become: true will use sudo
become = False
become_method = sudo

[ssh_connection]
# Not used for local connections, but good defaults
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
